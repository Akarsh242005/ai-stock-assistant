# ============================================================
# GitHub Actions — CI/CD Pipeline
# ============================================================
# Triggers:
#   - Push to main or develop
#   - Pull requests to main
#
# Jobs:
#   1. test      Run full pytest suite
#   2. lint      flake8 code quality
#   3. build     Build Docker image
#   4. deploy    Deploy to Render (main branch only)
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: ai-stock-assistant

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: Run Tests
  # ──────────────────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx pytest pytest-cov pillow

      - name: Run pytest
        run: |
          cd ai-stock-assistant
          pytest backend/tests/ -v --tb=short \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            -q
        env:
          PYTHONPATH: backend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────
  # JOB 2: Lint
  # ──────────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 backend/ scripts/ \
            --max-line-length=100 \
            --exclude=__pycache__,venv,.venv \
            --ignore=E501,W503,E402 \
            --statistics

  # ──────────────────────────────────────────────────────────
  # JOB 3: Build Docker Image
  # ──────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ test, lint ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 4: Deploy to Render (main branch only)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        # Render provides a deploy hook URL — set it as a repo secret
        # Settings → Secrets → RENDER_DEPLOY_HOOK_URL
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Notify deployment
        run: |
          echo "✓ Deployment triggered for commit ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Actor:  ${{ github.actor }}"
