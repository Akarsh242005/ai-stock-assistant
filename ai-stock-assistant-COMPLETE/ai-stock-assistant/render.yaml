# ============================================================
# Render Deployment Configuration
# ============================================================
# This file configures deployment on render.com (free tier)
# Connect your GitHub repo and this file auto-configures it.
# ============================================================

services:
  - type: web
    name: ai-stock-assistant-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    healthCheckPath: /api/health
